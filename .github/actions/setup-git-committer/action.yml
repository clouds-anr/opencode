name: "Setup Git Committer"
description: "Create app token and configure git user"
inputs:
  opencode-app-id:
    description: "OpenCode GitHub App ID"
    required: false
    default: ""
  opencode-app-secret:
    description: "OpenCode GitHub App private key"
    required: false
    default: ""
outputs:
  token:
    description: "GitHub App token (or fallback GITHUB_TOKEN)"
    value: ${{ steps.resolve.outputs.token }}
  app-slug:
    description: "GitHub App slug"
    value: ${{ steps.resolve.outputs.app-slug }}
runs:
  using: "composite"
  steps:
    - name: Create app token
      id: apptoken
      if: inputs.opencode-app-id != '' && inputs.opencode-app-secret != ''
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.opencode-app-id }}
        private-key: ${{ inputs.opencode-app-secret }}
        owner: ${{ github.repository_owner }}

    - name: Resolve token
      id: resolve
      run: |
        if [ -n "$APP_TOKEN" ]; then
          echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
          echo "app-slug=$APP_SLUG" >> "$GITHUB_OUTPUT"
        else
          echo "token=$FALLBACK_TOKEN" >> "$GITHUB_OUTPUT"
          echo "app-slug=github-actions" >> "$GITHUB_OUTPUT"
          echo "::notice::No GitHub App credentials found, falling back to GITHUB_TOKEN"
        fi
      shell: bash
      env:
        APP_TOKEN: ${{ steps.apptoken.outputs.token }}
        APP_SLUG: ${{ steps.apptoken.outputs.app-slug }}
        FALLBACK_TOKEN: ${{ github.token }}

    - name: Configure git user
      run: |
        slug="${{ steps.resolve.outputs.app-slug }}"
        git config --global user.name "${slug}[bot]"
        git config --global user.email "${slug}[bot]@users.noreply.github.com"
      shell: bash

    - name: Clear checkout auth
      run: |
        git config --local --unset-all http.https://github.com/.extraheader || true
      shell: bash

    - name: Configure git remote
      run: |
        git remote set-url origin https://x-access-token:${{ steps.resolve.outputs.token }}@github.com/${{ github.repository }}
      shell: bash
