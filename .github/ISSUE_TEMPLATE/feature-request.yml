## Instructions for Copilot

- Branch off `[relevant base branch, e.g., main or Sprint1]` as `feature/[short-feature-name]`.
- Use React, TypeScript, and any required libraries per `../copilot-instructions.md` and project style guides:
    - Separate UI, logic, and hooks for clarity and reusability.
    - Leverage React functional components and hooks (`useState`, `useEffect`, etc).
    - Mock APIs and external dependencies for reliable, isolated testing via `vi.mock` or `vi.spyOn`.
    - Follow code style and architectural conventions: camelCase variables, descriptive naming, strict typing, and maintainable folder structure.
    - Use JSDoc and inline comments for any complex or non-obvious logic, explaining the reasoning and intent.
    - Optimize for performance—prevent unnecessary rendering and expensive computations (e.g., `React.memo`, `useCallback`).
    - Sanitize dynamic content and guard against XSS or other security flaws.
    - Use and extend the testing utilities and mocks in `src/__mocks__/` and `src/__test__/`.
- Integrate with existing state management and context (Redux, Context API, etc) as required by feature needs.
- Write new unit tests and/or update existing tests, achieving a minimum of 80% coverage for all new/changed code, following the project's unit testing template and best practices.
    - If a new test file is needed, use `[ComponentName].test.tsx`. If one exists, extend it.
    - All tests must pass under `npm run test:ci:development`; strategically skip only if unavoidable.
- Use clear, conventional commit messages: e.g., `feat(admin): add bedrock agent admin tab UI`.
- Open a Pull Request referencing this issue, with screenshots or video for any UI changes, and a summary of test coverage.
- Update any relevant docs (README, API docs) if endpoints or configuration change.
- Capture key implementation details and decisions in the `doco/` folder, adhering to documentation standards.
- Cognitive Complexity must stay below 15 for all new/modified code.

## Acceptance Criteria
- All feature requirements and edge cases are fully implemented and documented.
- Code builds, runs, and passes all tests via `npm run start`, `npm run build`, and `npm run test:ci:development`.
- Feature integrates cleanly, without regressions, with existing components.
- Accessibility (WCAG 2.1 AA, Lighthouse accessibility ≥ 90) and UI/UX are upheld.
- Code meets all ESLint and Prettier rules.
- At least 80% code coverage is maintained or improved.
- No new security issues are present (as verified by lint and manual review).
- PR includes updated docs and clear setup or usage notes as needed.

### Biome Lint Compliance Checklist

All code, tests, and docs **must pass Biome checks before PR submission**.

- Run `npm run biome:check` locally before opening a PR.
- Do NOT use `any` (`any` type and weak types are forbidden).
- Remove all unused imports, variables, functions, and parameters.
- Maintain proper import order and grouping as enforced by Biome.
- Never disable, ignore, or bypass any Biome rule.
- Rely on Biome for code formatting—do not format manually.
- Review and follow all project-specific rules in `biome.json` (or the Biome config file in the repo root).
- Address all Biome suggestions and errors—do not submit a PR that “passes with warnings.”

#### Common Biome Issues to Avoid

- Unused imports, variables, or parameters
- Imports not sorted
- Prefer for...of instead of forEach
- Any use of `any` type
- Improper, unordered, or grouped imports
- Inconsistent formatting (indentation, spacing, semicolons)
- Disabling or bypassing Biome rules with comments
- Manual formatting overrides (always let Biome handle code style)

**Canonical command:**  
```
npm run biome:check
```
