name: Feature request
title: '[Feature]: '
labels:
  - feature
  - frontend
  - react
  - typescript
assignees: []
description: Submit an idea for this project

body:
  - type: markdown
    attributes:
      value: |
        ## Instructions

        Please fill out each section as thoroughly as possible. This template is designed for architectural rigor and clarity.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Set priority based on impact—High for user-facing features.
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Component
      description: Name and exact path of the affected component (e.g., `[ComponentName.tsx]` in `[path/to/component]`).
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: >
        Provide a detailed description including purpose, user impact, business or technical requirements, and deliverables. For example:
        - [ ] Admin screen with tab interface (Users, Bedrock, Chat, Logging, Application)
        - [ ] Accessible visual cues for selected tab
        - [ ] New adminBedrock component with grid (sortable/filterable, add/edit/delete/detail)
        - [ ] Modal for add/edit (fields: name, description, agentId, agentAliasId)
        - [ ] Confirmation dialog before delete
        - [ ] Integration of agent component into main admin tab view
        - [ ] Unit tests for full coverage, screenshots of UI changes, compliance with build and test
        - [ ] AWS Amplify Gen 2 architectural guidelines
    validations:
      required: true

  - type: textarea
    id: edge-cases
    attributes:
      label: Edge Cases & Accessibility
      description: >
        Describe how you will handle empty/missing/invalid data, loading/error/offline states, or extreme values (e.g., large data sets, unusual strings). All UI must meet WCAG 2.1 AA and Lighthouse ≥90.

  - type: textarea
    id: additional-requirements
    attributes:
      label: Additional Requirements
      description: Any extra specifics for internationalization, browser support, responsive design, and compliance.

  - type: markdown
    attributes:
      value: |
        ## Instructions for Copilot

        - Branch off the relevant base branch (e.g., `main` or `Sprint1`) as `feature/[short-feature-name]`
        - Use React, TypeScript, and project style guides (see `../copilot-instructions.md`)
        - Separate UI, logic, hooks; follow code style and conventions
        - Mock APIs and dependencies for testing (`vi.mock`, `vi.spyOn`)
        - Integrate with state management/context as needed
        - Write/update unit tests achieving ≥80% coverage; all tests must pass
        - Commit in conventional style: `feat(admin): add bedrock agent admin tab UI`
        - Reference this issue in your PR with UI screenshots/video and test coverage summary
        - Update relevant docs; capture implementation details in `doco/` folder
        - Cognitive Complexity <15 for all code

  - type: checkboxes
    id: biome-compliance
    attributes:
      label: Biome Lint Compliance Checklist
      description: All code, tests, and docs must pass Biome checks before PR submission.
      options:
        - label: Run `npm run biome:check` locally
        - label: Do NOT use `any` type anywhere
        - label: Remove unused imports, variables, functions, parameters
        - label: Maintain proper import order and grouping
        - label: Never disable or bypass Biome rules
        - label: Only use Biome for code formatting
        - label: Address all Biome suggestions/errors

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List all requirements for implementation, testing, accessibility, code style, coverage, security, docs, and clean integration with existing codebase.
